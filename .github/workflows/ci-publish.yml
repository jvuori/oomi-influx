name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  checks:
    uses: ./.github/workflows/ci-checks.yml

  publish:
    needs: checks
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/oomi-influx/
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for hatch-vcs to resolve the tag

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Build wheel and sdist
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
